<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;overflow:hidden;background:#000}
.fp-watermark{display:none!important}
#fp-nav ul li a span{background:#ffd700!important;border-color:#ffd700!important}
.section{text-align:center}

/* ==== PASSWORD GATE ==== */
#gate{position:fixed;z-index:9999;inset:0;background:radial-gradient(ellipse at center,#1a0a2e 0%,#0d0015 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s,visibility .8s}
#gate.hide{opacity:0;visibility:hidden;pointer-events:none}
#gate h2{color:#ffd700;font-size:30px;margin-bottom:6px;text-shadow:0 0 20px #ff8800;animation:glow 2s ease-in-out infinite}
#gate .subtitle{color:#ffb6c1;font-size:13px;margin-bottom:32px;animation:glow 2s ease-in-out .5s infinite}
#gate input{padding:12px 18px;font-size:15px;border:2px solid rgba(255,215,0,.5);border-radius:8px;background:rgba(255,255,255,.08);color:#ffd700;text-align:center;outline:none;width:220px;letter-spacing:2px;transition:border-color .3s}
#gate input:focus{border-color:#ffd700}
#gate input::placeholder{color:rgba(255,215,0,.3)}
#gate button{margin-top:20px;padding:10px 40px;font-size:15px;border:none;border-radius:8px;background:linear-gradient(135deg,#ff6b6b,#ffd700);color:#1a0a2e;cursor:pointer;font-weight:bold;transition:transform .2s,box-shadow .2s}
#gate button:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(255,215,0,.4)}
#gate .err{color:#ff6b6b;font-size:11px;margin-top:10px;min-height:16px}
@keyframes glow{0%,100%{opacity:1}50%{opacity:.5}}

/* ==== BG CANVAS ==== */
#bg{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ==== SECTION 1: CAKE ==== */
.s1{background:radial-gradient(ellipse at center 40%,#1a1040 0%,#0d0d2b 100%)}
.s1 svg{width:min(280px,60vw)}
.s1 .hint{color:#ffd700;font-size:12px;margin-top:16px;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ==== SECTION 2: BLESSINGS ==== */
.s2{background:radial-gradient(ellipse at center,#1a1040 0%,#0d0d2b 100%)}
.s2 .card{background:rgba(255,255,255,.04);border:1px solid rgba(255,215,0,.15);border-radius:16px;padding:36px 30px;max-width:420px;width:82%;backdrop-filter:blur(4px)}
.s2 .card h3{color:#ffd700;font-size:22px;margin-bottom:24px}
.s2 .card p{color:#ffb6c1;font-size:14px;line-height:2.4;text-align:center}
.s2 .card .emoji{font-size:40px;margin-bottom:16px}

/* ==== SECTION 3: FIREWORKS TEXT ==== */
.s3{background:#000}
.s3 canvas{display:block}
.s3 .launch-btn{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);z-index:10;padding:12px 32px;font-size:14px;font-family:inherit;border:2px solid #ffd700;border-radius:30px;background:transparent;color:#ffd700;cursor:pointer;transition:all .3s;letter-spacing:1px}
.s3 .launch-btn:hover{background:rgba(255,215,0,.15);box-shadow:0 0 20px rgba(255,215,0,.3)}

<script src="https://cdnjs.cloudflare.com/ajax/libs/fullPage.js/4.0.20/fullpage.min.js"></script>
<script>
// ==== PASSWORD ====
function checkPwd(){
  var v=document.getElementById("pwd").value.trim();
  if(v==="20040622"||v==="2004.06.22"||v==="2004-06-22"){
    document.getElementById("err").textContent="";
    document.getElementById("gate").classList.add("hide");
    startAll();
  }else{
    document.getElementById("err").textContent="❌ 不对哦，再想想~";
  }
}
document.getElementById("pwd").addEventListener("keydown",function(e){if(e.key==="Enter")checkPwd()});

// ==== BG CANVAS - stars + petals ====
var bgC=document.getElementById("bg"),bgX=bgC.getContext("2d");
var bW,bH,stars=[],petals=[];
function bgResize(){bW=bgC.width=innerWidth;bH=bgC.height=innerHeight}bgResize();addEventListener("resize",bgResize);
for(var i=0;i<100;i++)stars.push({x:Math.random()*2000,y:Math.random()*2000,r:.5+Math.random()*1.5,b:.3+Math.random()*.7});
for(var i=0;i<20;i++)petals.push({x:Math.random()*2000,y:-Math.random()*500,r:Math.random()*Math.PI*2,sp:.4+Math.random()*.8,sw:Math.random()*.02,w:3+Math.random()*4,h:4+Math.random()*5,op:.3+Math.random()*.5});
function drawBg(){
  bgX.clearRect(0,0,bW,bH);
  var g=bgX.createRadialGradient(bW/2,bH/2,0,bW/2,bH/2,Math.max(bW,bH));
  g.addColorStop(0,"#0d0d2b");g.addColorStop(1,"#000");bgX.fillStyle=g;bgX.fillRect(0,0,bW,bH);
  for(var i=0;i<stars.length;i++){var s=stars[i];bgX.globalAlpha=s.b+.4*Math.sin(Date.now()*.003+s.x);bgX.fillStyle="#fff";bgX.fillRect(s.x%bW,s.y%bH,s.r,s.r)}bgX.globalAlpha=1;
  for(var i=0;i<petals.length;i++){var p=petals[i];p.y+=p.sp;p.x+=Math.sin(Date.now()*.001+p.r)*.4;p.r+=p.sw;if(p.y>bH+50){p.y=-20;p.x=Math.random()*bW}bgX.globalAlpha=p.op;bgX.fillStyle="#ffb6c1";bgX.save();bgX.translate(p.x,p.y);bgX.rotate(p.r);bgX.fillRect(-p.w/2,-p.h/2,p.w,p.h);bgX.restore()}bgX.globalAlpha=1;
  requestAnimationFrame(drawBg);
}

// ==== FULLPAGE ====
var fp;
function startAll(){
  if(fp)return;
  drawBg();
  fp=new fullpage("#fullpage",{
    autoScrolling:true,navigation:true,navigationPosition:"right",
    afterLoad:function(origin,dest){
      if(dest.index===2)initFireworks();
    }
  });
}

// ==== CAKE CLICK -> BLOW CANDLES ====
document.querySelector(".s1").addEventListener("click",function(){
  var flames=document.querySelectorAll(".flames-group ellipse");
  if(flames.length>0){
    flames.forEach(function(f){f.setAttribute("opacity","0")});
    document.querySelector(".s1 .hint").textContent="🎉 蜡烛吹灭啦！向下滚动 →";
  }
});

// ==== FIREWORKS TEXT ANIMATION ====
var c1,c2,c3,ctx1,ctx2,ctx3,rockets=[],shards=[],targets=[],fidelity=3,counter=0,animationId;
var fwText="郑可乐,生日快乐！",fontSize=180;

function initFireworks(){
  if(c1)return;
  c1=document.getElementById("fw1");c2=document.getElementById("fw2");c3=document.getElementById("fw3");
  ctx1=c1.getContext("2d");ctx2=c2.getContext("2d");ctx3=c3.getContext("2d");
  [c1,c2,c3].forEach(function(c){c.width=innerWidth;c.height=innerHeight});
  
  // measure text
  var w=innerWidth,h=innerHeight;
  while(fontSize>20){
    ctx1.font="900 "+fontSize+"px Microsoft YaHei,PingFang SC,sans-serif";
    if(ctx1.measureText(fwText).width<w*.85)break;
    fontSize-=5;
  }
  c1.width=ctx1.measureText(fwText).width+20;c1.height=fontSize*1.5;
  ctx1.font="900 "+fontSize+"px Microsoft YaHei,PingFang SC,sans-serif";
  ctx1.clearRect(0,0,c1.width,c1.height);
  ctx1.fillStyle="#fff";ctx1.fillText(fwText,10,fontSize);
  
  // extract target pixels
  var imgData=ctx1.getImageData(0,0,c1.width,c1.height);
  targets=[];
  for(var i=0,max=imgData.data.length;i<max;i+=4){
    var alpha=imgData.data[i+3];
    var x=Math.floor(i/4)%imgData.width;
    var y=Math.floor(i/4/imgData.width);
    if(alpha&&x%fidelity===0&&y%fidelity===0){
      targets.push({x:x+Math.floor((w-c1.width)/2),y:y+Math.floor((h-fontSize*1.5)/2)});
    }
  }
  
  ctx3.fillStyle="#FFF";ctx3.shadowColor="#FFF";ctx3.shadowBlur=25;
  c2.width=w;c2.height=h;
  
  document.getElementById("launchBtn").onclick=function(){
    this.disabled=true;this.textContent="烟花绽放中...";
    rockets=[];shards=[];counter=0;ctx3.clearRect(0,0,w,h);
    if(animationId)cancelAnimationFrame(animationId);
    animate();
  };
}

class Shard{
  constructor(x,y,hue){
    this.x=x;this.y=y;this.hue=hue;this.lightness=50;this.size=15+Math.random()*10;
    var angle=Math.random()*2*Math.PI,blastSpeed=1+Math.random()*6;
    this.xSpeed=Math.cos(angle)*blastSpeed;this.ySpeed=Math.sin(angle)*blastSpeed;
    this.target=getTarget();this.ttl=100;this.timer=0;
  }
  draw(){ctx2.fillStyle="hsl("+this.hue+", 100%, "+this.lightness+"%)";ctx2.beginPath();ctx2.arc(this.x,this.y,this.size,0,2*Math.PI);ctx2.fill()}
  update(){
    if(this.target){
      var dx=this.target.x-this.x,dy=this.target.y-this.y,dist=Math.sqrt(dx*dx+dy*dy),a=Math.atan2(dy,dx),tx=Math.cos(a)*5,ty=Math.sin(a)*5;
      this.size=this.size+(1.5-this.size)*.05;
      if(dist<5){this.lightness=this.lightness+(100-this.lightness)*.01;this.xSpeed=this.ySpeed=0;this.x=this.x+(this.target.x+fidelity/2-this.x)*.05;this.y=this.y+(this.target.y+fidelity/2-this.y)*.05;this.timer+=1}
      else if(dist<10){this.lightness=this.lightness+(100-this.lightness)*.01;this.xSpeed=this.xSpeed+(tx-this.xSpeed)*.1;this.ySpeed=this.ySpeed+(ty-this.ySpeed)*.1;this.timer+=1}
      else{this.xSpeed=this.xSpeed+(tx-this.xSpeed)*.02;this.ySpeed=this.ySpeed+(ty-this.ySpeed)*.02}
    }else{this.ySpeed+=.05;this.size=this.size+(1-this.size)*.05}
    this.x+=this.xSpeed;this.y+=this.ySpeed;
  }
}

class Rocket{
  constructor(){
    var qw=c2.width/4;this.x=qw+Math.random()*(c2.width-qw);this.y=c2.height-15;this.angle=(Math.random()*Math.PI)/4-Math.PI/6;this.blastSpeed=6+Math.random()*7;this.shardCount=15+Math.floor(Math.random()*15);this.hue=Math.floor(Math.random()*360);
    this.xSpeed=Math.sin(this.angle)*this.blastSpeed;this.ySpeed=-Math.cos(this.angle)*this.blastSpeed;this.trail=[];
  }
  draw(){
    ctx2.save();ctx2.translate(this.x,this.y);ctx2.rotate(Math.atan2(-this.xSpeed,this.ySpeed));
    ctx2.fillStyle="hsl("+this.hue+", 100%, 70%)";ctx2.fillRect(-2,-8,4,16);
    ctx2.fillStyle="#fff";ctx2.fillRect(-1,-3,2,4);
    ctx2.fillStyle="hsl("+this.hue+", 100%, 50%)";
    for(var i=0;i<this.trail.length;i++){var t=this.trail[i];ctx2.globalAlpha=i/this.trail.length*.5;ctx2.fillRect(t.x-1,t.y-1,2,2)}ctx2.globalAlpha=1;
    ctx2.restore();
  }
  update(){
    this.trail.push({x:this.x-this.xSpeed*.3,y:this.y-this.ySpeed*.3});if(this.trail.length>10)this.trail.shift();
    this.xSpeed*=.99;this.ySpeed*=.99;this.ySpeed+=.02;this.x+=this.xSpeed;this.y+=this.ySpeed;
    if(this.ySpeed>0)this.explode();
  }
  explode(){
    for(var i=0;i<this.shardCount;i++)shards.push(new Shard(this.x,this.y,this.hue));
  }
}

function getTarget(){
  if(targets.length>0){var i=Math.floor(Math.random()*targets.length);var t=targets[i];targets.splice(i,1);return t}return null;
}

function animate(){
  ctx2.fillStyle="rgba(0, 0, 0, .12)";ctx2.fillRect(0,0,c2.width,c2.height);
  counter+=1;if(counter%15===0)rockets.push(new Rocket());
  for(var i=rockets.length-1;i>=0;i--){rockets[i].draw();rockets[i].update();if(rockets[i].ySpeed>0)rockets.splice(i,1)}
  for(var i=shards.length-1;i>=0;i--){shards[i].draw();shards[i].update();if(shards[i].timer>=shards[i].ttl||shards[i].lightness>=99){if(shards[i].target)ctx3.fillRect(shards[i].target.x,shards[i].target.y,fidelity+1,fidelity+1);shards.splice(i,1)}}
  animationId=requestAnimationFrame(animate);
  if(targets.length===0&&shards.length===0&&rockets.length===0){var btn=document.getElementById("launchBtn");btn.disabled=false;btn.textContent="🚀 再来一次"}
}
</script></body></html>
